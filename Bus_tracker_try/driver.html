<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Tracker Driver Console</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(14, 165, 233, 0.14), transparent 35%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .panel {
      width: min(460px, 100%);
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 30px 60px rgba(2, 6, 23, 0.55);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 16px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      color: #cbd5e1;
    }

    input,
    textarea,
    button {
      font: inherit;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 12px 14px;
    }

    input,
    textarea {
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      color: #f8fafc;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 4px;
    }

    button {
      cursor: pointer;
      color: #f8fafc;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .start {
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .stop {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

    .sos {
      background: linear-gradient(135deg, #f97316, #ea580c);
    }

    .status-card {
      margin-top: 18px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.18);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.9rem;
      background: rgba(14, 165, 233, 0.18);
      color: #bae6fd;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .mono {
      font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace;
      font-size: 0.88rem;
      color: #cbd5e1;
      word-break: break-word;
    }

    .hint {
      font-size: 0.88rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Driver Console</h1>
    <p>Use the same driver token that the backend expects. If you open this page with <span class="mono">?bus_id=BUS101&amp;token=demo-driver-token</span>, both fields are prefilled.</p>

    <div class="stack">
      <label>
        Bus ID
        <input id="busId" type="text" placeholder="BUS101" />
      </label>

      <label>
        Driver token
        <input id="driverToken" type="password" placeholder="demo-driver-token" />
      </label>

      <label>
        SOS note
        <textarea id="message" placeholder="Optional context for dispatch or admins"></textarea>
      </label>
    </div>

    <div class="actions">
      <button id="toggleTracking" class="start">Start tracking</button>
      <button id="sendSos" class="sos">Send SOS</button>
    </div>

    <section class="status-card">
      <div id="trackingState" class="pill">
        <span class="dot"></span>
        Tracking OFF
      </div>
      <div id="location" class="mono">Waiting for the first GPS fix.</div>
      <div id="lastResult" class="hint">No requests sent yet.</div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const busIdInput = document.getElementById("busId");
    const tokenInput = document.getElementById("driverToken");
    const messageInput = document.getElementById("message");
    const trackingState = document.getElementById("trackingState");
    const locationOutput = document.getElementById("location");
    const lastResult = document.getElementById("lastResult");
    const toggleTrackingButton = document.getElementById("toggleTracking");
    const sendSosButton = document.getElementById("sendSos");

    busIdInput.value = params.get("bus_id") || "BUS101";
    tokenInput.value = params.get("token") || "";

    let watchId = null;
    let tracking = false;
    let lastPosition = null;

    function setStatus(label, active) {
      trackingState.innerHTML = `<span class="dot"></span>${label}`;
      trackingState.style.background = active
        ? "rgba(34, 197, 94, 0.15)"
        : "rgba(14, 165, 233, 0.18)";
      trackingState.style.color = active ? "#bbf7d0" : "#bae6fd";
    }

    function requireCredentials() {
      const busId = busIdInput.value.trim();
      const token = tokenInput.value.trim();

      if (!busId || !token) {
        lastResult.textContent = "Bus ID and driver token are both required.";
        return null;
      }

      return { busId, token };
    }

    async function sendDriverRequest(path, payload) {
      const credentials = requireCredentials();
      if (!credentials) {
        return null;
      }

      const response = await fetch(path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-driver-token": credentials.token
        },
        body: JSON.stringify({
          ...payload,
          bus_id: credentials.busId
        })
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || data.message || "Request failed");
      }

      lastResult.textContent = data.message || "Request completed";
      return data;
    }

    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      tracking = false;
      watchId = null;
      setStatus("Tracking OFF", false);
      toggleTrackingButton.textContent = "Start tracking";
      toggleTrackingButton.className = "start";
    }

    function startTracking() {
      if (!navigator.geolocation) {
        lastResult.textContent = "This browser does not support geolocation.";
        return;
      }

      if (!requireCredentials()) {
        return;
      }

      tracking = true;
      setStatus("Tracking ON", true);
      toggleTrackingButton.textContent = "Stop tracking";
      toggleTrackingButton.className = "stop";

      watchId = navigator.geolocation.watchPosition(
        async ({ coords }) => {
          lastPosition = {
            lat: coords.latitude,
            lng: coords.longitude
          };

          locationOutput.textContent = `Lat ${lastPosition.lat.toFixed(5)} | Lng ${lastPosition.lng.toFixed(5)}`;

          try {
            const result = await sendDriverRequest("/api/driver/update", lastPosition);
            if (result && result.bus) {
              lastResult.textContent = `Update sent at ${new Date().toLocaleTimeString()}`;
            }
          } catch (error) {
            lastResult.textContent = error.message;
          }
        },
        (error) => {
          lastResult.textContent = error.message;
          stopTracking();
        },
        {
          enableHighAccuracy: true,
          maximumAge: 3000,
          timeout: 10000
        }
      );
    }

    toggleTrackingButton.addEventListener("click", () => {
      if (tracking) {
        stopTracking();
      } else {
        startTracking();
      }
    });

    sendSosButton.addEventListener("click", async () => {
      if (!lastPosition) {
        lastResult.textContent = "Get a GPS fix before sending SOS.";
        return;
      }

      sendSosButton.disabled = true;
      try {
        await sendDriverRequest("/api/driver/sos", {
          ...lastPosition,
          message: messageInput.value.trim() || null
        });
      } catch (error) {
        lastResult.textContent = error.message;
      } finally {
        sendSosButton.disabled = false;
      }
    });
  </script>
</body>
</html>
